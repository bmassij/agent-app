name: cursor_mobile_commander
description: Manage Cursor Background Agents from your phone
publish_to: none
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  connectivity_plus: ^6.0.3
  cursor_api_agents:
    path: ../../packages/cursor_api_agents
  cursor_api_core:
    path: ../../packages/cursor_api_core
  cursor_api_stream:
    path: ../../packages/cursor_api_stream
  dio: ^5.4.3
  drift: ^2.18.0
  flutter:
    sdk: flutter
  flutter_highlight: ^0.7.0
  flutter_local_notifications: ^17.2.2
  flutter_markdown: ^0.7.3
  flutter_riverpod: ^2.5.1
  flutter_secure_storage: ^9.2.4
  github_api:
    path: ../../packages/github_api
  go_router: ^14.2.0
  image_picker: ^1.1.2
  local_auth: ^2.3.0
  mobile_scanner: ^5.1.1
  riverpod_annotation: ^2.3.5
  share_plus: ^12.0.2
  speech_to_text: ^7.4.0
  sqlite3_flutter_libs: ^0.5.0
  workmanager: ^0.5.2

dev_dependencies:
  build_runner: ^2.4.10
  drift_dev: ^2.18.0
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.3
  riverpod_generator: ^2.4.2
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
